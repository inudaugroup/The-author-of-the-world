<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
        height: 600px; /* ここの数値は適宜調整してください */
        width: 100%;
        }
        .hp-container{
            width: 100px;
            height: 10px;
            background: #eee;
            border:1px solid #999;
            margin-top: 5px;
        }
        .hp-bar{
            height: 100%; 
            width: 0%; 
            transition: width 0.5s;
        }
        #actionMenu{
            position:absolute;
            display:none;

            background:white;
            border:1px solid black;
            padding:10px;

            z-index:9999;
        }

        #actionMenu button{
            display:block;
            width:100%;
            margin:2px 0;
        }
    </style>
</head>

<body>
    
<div id="actionMenu">
    <button onclick="buildSelectedCity()">都市建設</button>
    <button onclick="showSelectedInfo()">国家情報</button>
    <button>・・・</button>
</div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="game.js"></script>
</body>
<!-- 国家選択画面のUI -->
<div id="countrySelectModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;">
    <h1 style="margin-bottom: 30px; font-size: 36px;">国家を選択してください</h1>
    <div style="display: flex; gap: 20px;">
        <!-- スネイリ（オホーツク帝国） -->
        <button onclick="selectCountry('SNL')" style="padding: 20px 40px; font-size: 20px; background: blue; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            スネイリ民主主義共和国 (SNL)
        </button>
        <!-- 日本 -->
        <button onclick="selectCountry('JPN')" style="padding: 20px 40px; font-size: 20px; background: #9e2a2b; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            日本国 (JPN)
        </button>
        <!-- 中国 -->
        <button onclick="selectCountry('CHN')" style="padding: 20px 40px; font-size: 20px; background: #ffb703; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            中華民国 (CHN)
        </button>
    </div>
</div>
</html>
