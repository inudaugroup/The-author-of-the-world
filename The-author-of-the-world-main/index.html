<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Author of the World</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <style>
        #map {
            height: 600px; /* ここの数値は適宜調整してください */
            width: 100%;
        }
        .hp-container{
            width: 100px;
            height: 10px;
            background: #eee;
            border:1px solid #999;
            margin-top: 5px;
        }
        .hp-bar{
            height: 100%; 
            width: 0%; 
            transition: width 0.5s;
        }
        #actionMenu{
            position:absolute;
            display:none;

            background:white;
            border:1px solid black;
            padding:10px;

            z-index:9999;
        }

        #actionMenu button{
            display:block;
            width:100%;
            margin:2px 0;
        }

        /* ーーー インラインスタイルから移行したクラス ーーー */
        #countrySelectModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .modal-title {
            margin-bottom: 30px;
            font-size: 36px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
        }

        .btn-country {
            padding: 20px 40px;
            font-size: 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 各国家ボタン固有の背景色・文字色 */
        .btn-snl {
            background: blue;
        }

        .btn-jpn {
            background: #9e2a2b;
        }

        .btn-chn {
            background: #ffb703;
            color: black;
        }
    </style>
</head>

<body>
    
<div id="actionMenu">
    <button onclick="buildSelectedCity()">都市建設</button>
    <button onclick="showSelectedInfo()">国家情報</button>
    <button>・・・</button>
</div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="army.js"></script>
    <script src="game.js"></script>

    <!-- 国家選択画面のUI（クラスを適用してスッキリさせました） -->
    <div id="countrySelectModal">
        <h1 class="modal-title">国家を選択してください</h1>
        <div class="btn-container">
            <!-- スネイリ（オホーツク帝国） -->
            <button onclick="selectCountry('SNL')" class="btn-country btn-snl">
                スネイリ民主主義共和国 (SNL)
            </button>
            <!-- 日本 -->
            <button onclick="selectCountry('JPN')" class="btn-country btn-jpn">
                日本国 (JPN)
            </button>
            <!-- 中国 -->
            <button onclick="selectCountry('CHN')" class="btn-country btn-chn">
                中華民国 (CHN)
            </button>
        </div>
    </div>
</body>
</html>
